<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="카피바라 머리 위에 물건을 쌓아 최고 기록에 도전하세요!" />
    <title>카피바라 탑쌓기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app">
      <canvas id="scene-3d" aria-hidden="true"></canvas>
      <canvas id="physics-canvas" aria-label="탑 쌓기 게임 영역"></canvas>

      <header class="hud">
        <div class="hud__scores">
          <div class="score-pill">
            <span class="label">층</span>
            <strong id="score-floors">0</strong>
          </div>
          <div class="score-pill score-pill--accent">
            <span class="label">높이</span>
            <strong id="score-height">0</strong>
            <span class="unit">cm</span>
          </div>
        </div>
        <div class="hud__records">
          <span>최고 <b id="best-all">0</b>cm</span>
          <span class="dot">·</span>
          <span>오늘 <b id="best-daily">0</b>cm</span>
        </div>
      </header>

      <div id="preview" class="preview" hidden>
        <span id="preview-label" class="preview__label"></span>
      </div>

      <div id="status" class="status" hidden></div>

      <footer class="controls">
        <button id="btn-stop" type="button" class="btn btn--ghost" hidden>기록 제출</button>
        <button id="btn-drop" type="button" class="btn btn--primary" disabled>DROP</button>
        <button id="btn-share" type="button" class="btn btn--ghost" hidden>기록 공유</button>
      </footer>

      <div id="overlay" class="overlay" hidden>
        <div class="card">
          <p class="card__tag" id="overlay-tag">기록 도전</p>
          <h2 id="overlay-title">새 기록!</h2>
          <p class="card__stats" id="overlay-stats"></p>
          <p class="card__hint" id="overlay-hint"></p>
          <div class="card__actions">
            <button id="btn-retry" type="button" class="btn btn--primary">다시 도전</button>
            <button id="btn-share-modal" type="button" class="btn btn--ghost">공유 카드</button>
          </div>
        </div>
      </div>

      <div id="share-modal" class="overlay" hidden>
        <div class="card card--share">
          <canvas id="share-canvas" width="540" height="960"></canvas>
          <div class="card__actions">
            <a id="btn-download" class="btn btn--primary" download="capybara-stack.png">이미지 저장</a>
            <button id="btn-close-share" type="button" class="btn btn--ghost">닫기</button>
          </div>
        </div>
      </div>

      <div class="intro" id="intro">
        <h1>카피바라 탑쌓기</h1>
        <p>좌우로 움직일 때 <strong>탭</strong>해서 쌓아 올리기!</p>
        <p class="intro__sub">겹치는 너비만 다음 층에 쌓여요. 어긋나면 게임 오버!</p>
        <p class="intro__daily" id="intro-daily"></p>
        <button id="btn-start" type="button" class="btn btn--primary">시작하기</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
